name: Build and Deploy to microk8s (Simple)

# Этот workflow подходит для локального microk8s
# Использует встроенный Docker registry microk8s

on:
  push:
    branches: [ main, develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${BRANCH_NAME}-${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image will be tagged as: ${TAG}"

      - name: Check if deployment secrets are configured
        id: check_secrets
        run: |
          if [ -z "${{ secrets.MICROK8S_HOST }}" ] || [ -z "${{ secrets.MICROK8S_USER }}" ] || [ -z "${{ secrets.MICROK8S_KEY }}" ]; then
            echo "status=not_configured" >> $GITHUB_OUTPUT
            echo "⚠️  Deployment secrets not configured yet"
            echo "Please add to GitHub Settings → Secrets and variables → Actions:"
            echo "  - MICROK8S_HOST"
            echo "  - MICROK8S_USER"
            echo "  - MICROK8S_KEY"
          else
            echo "status=configured" >> $GITHUB_OUTPUT
            echo "✅ Deployment secrets configured"
          fi

      - name: Deploy to microk8s
        if: steps.check_secrets.outputs.status == 'configured'
        env:
          MICROK8S_HOST: ${{ secrets.MICROK8S_HOST }}
          MICROK8S_USER: ${{ secrets.MICROK8S_USER }}
          MICROK8S_KEY: ${{ secrets.MICROK8S_KEY }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          
          # Create SSH key directory
          mkdir -p ~/.ssh
          
          # Decode SSH key from base64
          echo "$MICROK8S_KEY" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add host to known_hosts
          ssh-keyscan -H "$MICROK8S_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          echo "✅ SSH key configured"
          
          # Deploy script
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$MICROK8S_USER@$MICROK8S_HOST" << 'DEPLOY_SCRIPT'
            set -e
            
            REPO_NAME="itemstock_mvp"
            DEPLOYMENT="itemstock-app"
            NAMESPACE="itemstock"
            IMAGE_TAG="${{ env.IMAGE_TAG }}"
            
            echo "=========================================="
            echo "Starting deployment to microk8s"
            echo "=========================================="
            echo "Image tag: $IMAGE_TAG"
            echo "Branch: ${{ env.BRANCH }}"
            echo ""
            
            # Create temporary directory for deployment
            TEMP_DIR=$(mktemp -d)
            trap "rm -rf $TEMP_DIR" EXIT
            
            cd $TEMP_DIR
            
            # Clone or update repository
            if [ -d "$REPO_NAME" ]; then
              echo "📝 Updating existing repository..."
              cd $REPO_NAME
              git fetch origin
              git checkout ${{ env.BRANCH }}
              git pull origin ${{ env.BRANCH }}
            else
              echo "📥 Cloning repository..."
              git clone -b ${{ env.BRANCH }} https://github.com/${{ github.repository }}.git $REPO_NAME
              cd $REPO_NAME
            fi
            
            echo "✅ Repository ready"
            echo ""
            
            # Build Docker image locally
            echo "🐳 Building Docker image..."
            docker build -t itemstock:$IMAGE_TAG . 2>&1 | tail -20
            
            echo "✅ Docker image built: itemstock:$IMAGE_TAG"
            echo ""
            
            # Create namespace if needed
            echo "☸️  Checking namespace..."
            microk8s kubectl create namespace $NAMESPACE --dry-run=client -o yaml | microk8s kubectl apply -f - > /dev/null 2>&1
            echo "✅ Namespace ready"
            echo ""
            
            # Apply manifests
            echo "📋 Applying Kubernetes manifests..."
            microk8s kubectl apply -f k8s/deployment.yaml 2>&1 | grep -E "(created|configured|unchanged)" || echo "  (no changes)"
            echo "✅ Manifests applied"
            echo ""
            
            # Update image in deployment
            echo "🔄 Updating deployment image..."
            microk8s kubectl set image deployment/$DEPLOYMENT \
              itemstock=itemstock:$IMAGE_TAG \
              -n $NAMESPACE 2>&1 | grep -E "(image updated|not found)" || echo "  Image set"
            
            echo "✅ Deployment image updated"
            echo ""
            
            # Wait for rollout
            echo "⏳ Waiting for deployment to roll out (max 5 minutes)..."
            if microk8s kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=5m; then
              echo "✅ Rollout successful!"
            else
              echo "⚠️  Rollout status check timed out (this may be normal)"
            fi
            
            echo ""
            echo "=========================================="
            echo "✅ Deployment completed!"
            echo "=========================================="
            echo ""
            
            # Show deployment info
            echo "📊 Deployment status:"
            microk8s kubectl get deployment -n $NAMESPACE | head -2
            echo ""
            
            echo "📦 Pod status:"
            microk8s kubectl get pods -n $NAMESPACE -o wide | head -3
            echo ""
            
            echo "🌐 Service info:"
            microk8s kubectl get svc -n $NAMESPACE | grep itemstock-service
            echo ""
            
            echo "💡 To view logs, run:"
            echo "   microk8s kubectl logs -n $NAMESPACE -l app=itemstock -f"
          DEPLOY_SCRIPT
          
          echo ""
          echo "✅ Deployment script completed"

      - name: Deployment status
        if: always()
        run: |
          echo ""
          echo "=========================================="
          if [ "${{ steps.check_secrets.outputs.status }}" == "not_configured" ]; then
            echo "⚠️  Deployment skipped - secrets not configured"
            echo ""
            echo "To enable automatic deployment:"
            echo "1. Go to GitHub Repository Settings"
            echo "2. Secrets and variables → Actions"
            echo "3. Add these secrets:"
            echo "   - MICROK8S_HOST (IP of your microk8s server)"
            echo "   - MICROK8S_USER (SSH username)"
            echo "   - MICROK8S_KEY (base64 encoded SSH private key)"
            echo ""
            echo "See GITHUB_SECRETS.md for detailed instructions"
          else
            echo "✅ Deployment workflow completed"
          fi
          echo "=========================================="
