name: Build and Deploy to microk8s (Simple)

# Этот workflow подходит для локального microk8s
# Использует встроенный Docker registry microk8s

on:
  push:
    branches: [ main, develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="${BRANCH_NAME}-${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image will be tagged as: ${TAG}"

      - name: Deploy to microk8s
        env:
          MICROK8S_HOST: ${{ secrets.MICROK8S_HOST }}
          MICROK8S_USER: ${{ secrets.MICROK8S_USER }}
          MICROK8S_KEY: ${{ secrets.MICROK8S_KEY }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Create SSH key
          mkdir -p ~/.ssh
          echo "$MICROK8S_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$MICROK8S_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Deploy script
          ssh "$MICROK8S_USER@$MICROK8S_HOST" << 'DEPLOY_SCRIPT'
            set -e
            
            REPO_NAME="itemstock_mvp"
            DEPLOYMENT="itemstock-app"
            NAMESPACE="itemstock"
            IMAGE_TAG="${{ env.IMAGE_TAG }}"
            
            echo "Starting deployment to microk8s..."
            echo "Image tag: $IMAGE_TAG"
            
            # Create temporary directory for deployment
            TEMP_DIR=$(mktemp -d)
            trap "rm -rf $TEMP_DIR" EXIT
            
            cd $TEMP_DIR
            
            # Clone or update repository
            if [ -d "$REPO_NAME" ]; then
              echo "Updating existing repository..."
              cd $REPO_NAME
              git fetch origin
              git checkout ${{ env.BRANCH }}
              git pull origin ${{ env.BRANCH }}
            else
              echo "Cloning repository..."
              git clone -b ${{ env.BRANCH }} https://github.com/${{ github.repository }}.git $REPO_NAME
              cd $REPO_NAME
            fi
            
            # Build Docker image locally
            echo "Building Docker image locally on microk8s..."
            docker build -t itemstock:$IMAGE_TAG .
            
            # Tag for microk8s registry (if using local registry)
            # docker tag itemstock:$IMAGE_TAG localhost:32000/itemstock:$IMAGE_TAG
            # docker push localhost:32000/itemstock:$IMAGE_TAG
            
            # Create namespace if needed
            microk8s kubectl create namespace $NAMESPACE --dry-run=client -o yaml | microk8s kubectl apply -f -
            
            # Apply manifests
            echo "Applying Kubernetes manifests..."
            microk8s kubectl apply -f k8s/deployment.yaml
            
            # Update image in deployment
            echo "Updating deployment with new image..."
            microk8s kubectl set image deployment/$DEPLOYMENT \
              itemstock=itemstock:$IMAGE_TAG \
              -n $NAMESPACE
            
            # Wait for rollout
            echo "Waiting for deployment to rollout..."
            microk8s kubectl rollout status deployment/$DEPLOYMENT -n $NAMESPACE --timeout=5m
            
            echo "✓ Deployment completed successfully!"
            
            # Show deployment info
            echo ""
            echo "Deployment info:"
            microk8s kubectl get deployment -n $NAMESPACE
            echo ""
            echo "Pods:"
            microk8s kubectl get pods -n $NAMESPACE
            echo ""
            echo "Services:"
            microk8s kubectl get svc -n $NAMESPACE
          DEPLOY_SCRIPT

      - name: Deployment status
        if: always()
        run: echo "Deployment attempt completed"
